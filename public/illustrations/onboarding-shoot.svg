<svg xmlns="http://www.w3.org/2000/svg" width="240" height="200" viewBox="0 0 240 200" fill="none">
  <!-- 单色线稿风格：拍摄引导插画 - 手机+相机+光线 -->
  <!-- MIT License -->
  <g stroke="#00754A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 手机主体 -->
    <rect x="90" y="35" width="60" height="105" rx="8" fill="none"/>
    <!-- 手机屏幕 -->
    <rect x="95" y="48" width="50" height="78" rx="2" fill="none"/>
    <!-- 手机底部按钮 -->
    <circle cx="120" cy="134" r="3" fill="none"/>
    <!-- 屏幕内的相机图标 -->
    <circle cx="120" cy="80" r="12" fill="none"/>
    <circle cx="120" cy="80" r="5" fill="none"/>
    <!-- 镜头光线发散 -->
    <line x1="120" y1="62" x2="120" y2="55" opacity="0.4"/>
    <line x1="132" y1="68" x2="137" y2="63" opacity="0.4"/>
    <line x1="108" y1="68" x2="103" y2="63" opacity="0.4"/>
    <!-- 左侧星光装饰 -->
    <path d="M55 70 L58 65 L61 70 L58 75 Z" fill="none" opacity="0.35"/>
    <circle cx="48" cy="90" r="1.5" fill="#00754A" opacity="0.2"/>
    <!-- 右侧星光装饰 -->
    <path d="M180 65 L183 60 L186 65 L183 70 Z" fill="none" opacity="0.35"/>
    <circle cx="190" cy="85" r="1.5" fill="#00754A" opacity="0.2"/>
    <!-- 底部引导箭头 -->
    <path d="M105 160 L120 172 L135 160" fill="none"/>
    <line x1="120" y1="150" x2="120" y2="172"/>
    <!-- 底部装饰弧线 -->
    <path d="M75 185 Q120 192 165 185" fill="none" opacity="0.25"/>
  </g>
</svg>
